<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard - Expert</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<style>
  .note {
  font-family: 'Courier New', monospace;
  display: inline-block;               
  color: #3fc9ff;
}

</style>
<body>
   <nav class="navbar">
    <div class="logo">PhishGuard</div>
    <ul class="nav-links">
      <li><a href="home">Home</a></li>
      <li><a href="evaluate">Evaluate</a></li>
      <li><a href="about">About us</a></li>
      <li><a href="contact">Contact us</a></li>
       {%if session["user_id"]%}
        {%if session["user_id"] == -1%}
        <a href="dashboard">Statistics</a>
        {%endif%}
         <a href="logout" class="btn-signin">Logout</a>
         {%else%}
        <a href="login" class="btn-signin">Sign in</a>
        <a href="register" class="btn-signin">Sign up</a>
        {%endif%}
    </ul>
  </nav>
  <section class="container">
  
<div class="grid-container">
   {%for m in mails%}
  <div class="grid-item">
    <div class="icon-circle">
      <img src="https://img.icons8.com/ios-filled/30/ffffff/security-checked.png" alt="Security Icon">
    </div>
    <h3>Email Added by Expert:</h3>
    <p>{{m[1]}}</p>
    <div class="evaluation-row">
  <span class="eval-item">
   <label style="display:flex; align-items:center; gap:8px;">
  <img src="https://img.icons8.com/ios-filled/24/3fc9ff/info.png" alt="Info">
  By: {{m[0]}}
</label>

<label style="display:flex; align-items:center; gap:8px; margin-top:10px;">
  <img src="https://img.icons8.com/ios-filled/24/3fc9ff/info.png" alt="Info">
  Label: {{m[2]}}
</label>


  </span>
  <div class="button-row">
  <button class="green-btn pill yes" onclick="add_expert_mail('{{m[3]}}')">
    <img src="https://img.icons8.com/ios-filled/24/ffffff/checkmark.png" alt="Correct">
  </button>
  <button class="red-btn pill no"  onclick="remove_expert_mail('{{m[3]}}')">
    <img src="https://img.icons8.com/ios-filled/24/ffffff/delete-sign.png" alt="Wrong">
  </button>
</div>
  </div>
  </div>
  {%endfor%}
</div>
  </section>
  <script>
   function add_expert_mail(id){
    window.location.href = "/add_expert_mail?mid=" + id
  }

  function remove_expert_mail(id){
    window.location.href = "/remove_expert_mail?mid=" + id
  }
  </script>
</body>
</html>
